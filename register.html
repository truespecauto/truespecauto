<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TrueSpec Automotive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        truespec: { blue: '#1e3a8a', grey: '#64748b', light: '#f8fafc' }
                    }
                }
            }
        }
    </script>
    <script src="config.js"></script>

</head>
<body class="bg-truespec-light h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full overflow-y-auto max-h-[90vh]">
        <div class="text-center mb-6">
            <!-- LOGO PLACEHOLDER -->
            <img src="images/logo.png" alt="TrueSpec Logo" class="h-12 mx-auto mb-4 object-contain" style="display: block; justify-self: center;">
            <h2 class="text-2xl font-bold text-truespec-blue">Create Account</h2>
        </div>

        <form id="registerForm" class="space-y-4">
            <!-- Common Fields -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="name" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-truespec-blue focus:border-truespec-blue">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-truespec-blue focus:border-truespec-blue">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <!-- PASSWORD TOGGLE CONTAINER -->
                <div class="relative mt-1">
                    <input type="password" id="password" required class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-truespec-blue focus:border-truespec-blue pr-10">
                    <button type="button" onclick="togglePasswordVisibility('password', 'eyeIcon', 'eyeSlashIcon')" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500 hover:text-truespec-blue focus:outline-none">
                        <!-- Eye Icon (Show) -->
                        <svg id="eyeIcon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <!-- Eye Slash Icon (Hide) - Hidden by default -->
                        <svg id="eyeSlashIcon" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-3.772 4.772m0 0L21 21" />
                        </svg>
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">I want to join as a:</label>
                <select id="role" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-truespec-blue focus:border-truespec-blue">
                    <!-- Note: For MVP customers usually book without signing up first, but keeping 'user' here just in case -->
                    <option value="user">Customer (Request Services)</option>
                    <option value="mechanic">Inspector (Join TrueSpec)</option>
                    <option value="admin">TrueSpec Admin</option>
                </select>
            </div>

            <!-- Mechanic Specific Fields (Hidden by default) -->
            <div id="mechanicFields" class="hidden space-y-4 border-t pt-4 mt-4 bg-slate-50 p-4 rounded">
                <p class="text-sm text-truespec-blue font-bold uppercase tracking-wide">Inspector Profile</p>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Services Qualified For</label>
                    <div class="space-y-2">
                        <div class="flex items-center">
                            <input id="service1" type="checkbox" value="On-Demand Mechanical Services" class="h-4 w-4 text-truespec-blue border-gray-300 rounded">
                            <label for="service1" class="ml-2 block text-sm text-gray-900">On-Demand Mechanical Services</label>
                        </div>
                        <div class="flex items-center">
                            <input id="service2" type="checkbox" value="Car Inspection Requests" class="h-4 w-4 text-truespec-blue border-gray-300 rounded">
                            <label for="service2" class="ml-2 block text-sm text-gray-900">Car Inspection Requests</label>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Location (City/Area)</label>
                    <input type="text" id="location" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Experience / Bio</label>
                    <textarea id="description" rows="2" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm"></textarea>
                </div>
            </div>

            <!-- Admin Specific Fields (Hidden by default) -->
            <div id="adminFields" class="hidden border-t pt-4 mt-4">
                <label class="block text-sm font-medium text-red-600">Admin Secret Code</label>
                <input type="password" id="adminCode" placeholder="Enter secret code" class="mt-1 block w-full px-3 py-2 border border-red-300 rounded-md shadow-sm focus:ring-red-500 focus:border-red-500">
            </div>

            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-truespec-blue hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-truespec-blue">
                Sign Up
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">Already have an account? <a href="login.html" class="font-medium text-truespec-blue hover:text-blue-800">Log in</a></p>
        </div>
    </div>

    <script>
        // --- HELPER: Toggle Password Visibility ---
        function togglePasswordVisibility(inputId, eyeIconId, eyeSlashIconId) {
            const input = document.getElementById(inputId);
            const eyeIcon = document.getElementById(eyeIconId);
            const eyeSlashIcon = document.getElementById(eyeSlashIconId);
            
            if (input.type === "password") {
                input.type = "text";
                eyeIcon.classList.add("hidden");
                eyeSlashIcon.classList.remove("hidden");
            } else {
                input.type = "password";
                eyeIcon.classList.remove("hidden");
                eyeSlashIcon.classList.add("hidden");
            }
        }

        const roleSelect = document.getElementById('role');
        const mechanicFields = document.getElementById('mechanicFields');
        const adminFields = document.getElementById('adminFields');

        // Toggle fields based on role
        roleSelect.addEventListener('change', (e) => {
            mechanicFields.classList.add('hidden');
            adminFields.classList.add('hidden');
            if(e.target.value === 'mechanic') mechanicFields.classList.remove('hidden');
            if(e.target.value === 'admin') adminFields.classList.remove('hidden');
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const role = document.getElementById('role').value;
            
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: role
            };

            if (role === 'admin') {
                payload.adminCode = document.getElementById('adminCode').value;
            }

            if (role === 'mechanic') {
                const selectedServices = [];
                if(document.getElementById('service1').checked) selectedServices.push(document.getElementById('service1').value);
                if(document.getElementById('service2').checked) selectedServices.push(document.getElementById('service2').value);

                if(selectedServices.length === 0) {
                    alert("Please select at least one service.");
                    return;
                }

                payload.mechanicDetails = {
                    services: selectedServices, 
                    rate: "Standard", // Defaulting rate for now
                    location: document.getElementById('location').value,
                    description: document.getElementById('description').value
                };
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert('Registration successful! Please log in.');
                    window.location.href = '/login.html';
                } else {
                    alert(data.message || 'Registration failed');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred. check console.');
            }
        });
    </script>
</body>
</html>
